<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | GCU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#001943", secondary: "#7b5800", surface: "#f9f9f9" },
                    fontFamily: { serif: ["Noto Serif"], sans: ["Work Sans"] }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-primary font-sans">
    
    <div id="loginSection" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
            <h1 class="text-3xl font-serif font-bold mb-6 text-center">Admin Login</h1>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Username</label>
                    <input id="username" type="text" class="w-full p-3 bg-gray-100 rounded-lg border border-transparent focus:border-primary outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Password</label>
                    <input id="password" type="password" class="w-full p-3 bg-gray-100 rounded-lg border border-transparent focus:border-primary outline-none" required>
                </div>
                <div id="loginError" class="text-red-600 text-sm hidden">Invalid credentials.</div>
                <button type="submit" class="w-full py-3 bg-primary text-white rounded-lg font-bold hover:bg-opacity-90">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="min-h-screen p-8 hidden">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-serif font-bold">Registration Dashboard</h1>
                <button id="logoutBtn" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg font-bold text-sm hover:bg-red-200">Logout</button>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-lg mb-8 flex items-end gap-4">
                <div class="flex-1 max-w-sm">
                    <label class="block text-sm font-semibold mb-2">Filter by Department</label>
                    <select id="departmentFilter" class="w-full p-3 bg-gray-100 rounded-lg">
                        <option value="">All Departments</option>
                        <!-- Added dynamically or manually; keep basic for now -->
                        <option value="Computer Science & Engineering">Computer Science & Engineering</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        <option value="Electrical Engineering">Electrical Engineering</option>
                        <option value="Electronics and Communication Engineering">Electronics and Communication Engineering</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Computer Application">Computer Application</option>
                        <option value="Medical Laboratory Technology">Medical Laboratory Technology</option>
                        <option value="Physiotherapy">Physiotherapy</option>
                        <option value="History">History</option>
                        <option value="Psychology">Psychology</option>
                        <option value="Economics">Economics</option>
                        <option value="Sociology">Sociology</option>
                        <option value="Political Science">Political Science</option>
                        <option value="English & Foreign Language">English & Foreign Language</option>
                        <option value="Education">Education</option>
                        <option value="Journalism & Mass Communication">Journalism & Mass Communication</option>
                        <option value="Law">Law</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Zoology">Zoology</option>
                        <option value="Botany">Botany</option>
                        <option value="Agriculture">Agriculture</option>
                        <option value="Pharmaceutical Science">Pharmaceutical Science</option>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-sm uppercase tracking-wide">
                            <th class="p-4 border-b">Name</th>
                            <th class="p-4 border-b">Email</th>
                            <th class="p-4 border-b">Institute</th>
                            <th class="p-4 border-b">Level</th>
                            <th class="p-4 border-b">Degree</th>
                            <th class="p-4 border-b">Department</th>
                            <th class="p-4 border-b">Domain</th>
                            <th class="p-4 border-b">Phone</th>
                            <th class="p-4 border-b">Receipt</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="text-sm">
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
                <div id="loadingMessage" class="p-8 text-center text-gray-500 font-semibold">Loading data...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://swcnwmpazryazqymdthh.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3Y253bXBhenJ5YXpxeW1kdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTMwOTgsImV4cCI6MjA5MDY2OTA5OH0.iT74-cfBnOJZrUeXyKEsZl9hEjbngcRXqyRcRg0JNHU'
        const supabase = createClient(supabaseUrl, supabaseKey)

        let allData = [];

        // UI Elements
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const departmentFilter = document.getElementById('departmentFilter');
        const dataTableBody = document.getElementById('dataTableBody');
        const loadingMessage = document.getElementById('loadingMessage');

        // Check login state
        if(sessionStorage.getItem('gcu_admin_logged_in') === 'true') {
            showDashboard();
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === 'admin' && pass === 'admin') {
                sessionStorage.setItem('gcu_admin_logged_in', 'true');
                loginError.classList.add('hidden');
                showDashboard();
            } else {
                loginError.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('gcu_admin_logged_in');
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        });

        departmentFilter.addEventListener('change', () => {
            renderData(departmentFilter.value);
        });

        async function showDashboard() {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            await fetchData();
        }

        async function fetchData() {
            loadingMessage.classList.remove('hidden');
            dataTableBody.innerHTML = '';
            
            const { data, error } = await supabase
                .from('gcu_registrations')
                .select('*')
                .order('created_at', { ascending: false });

            loadingMessage.classList.add('hidden');

            if (error) {
                console.error(error);
                dataTableBody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-red-500">Error fetching data</td></tr>`;
                return;
            }

            allData = data || [];
            renderData('');
        }

        function renderData(filterDept) {
            dataTableBody.innerHTML = '';
            const filtered = filterDept 
                ? allData.filter(item => item.department === filterDept)
                : allData;

            if (filtered.length === 0) {
                dataTableBody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-gray-500">No registrations found.</td></tr>`;
                return;
            }

            filtered.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="p-4 font-medium">${item.first_name || ''} ${item.last_name || ''}</td>
                    <td class="p-4">${item.email || ''}</td>
                    <td class="p-4">${item.institute_name || ''}</td>
                    <td class="p-4">${item.current_level_study || ''}</td>
                    <td class="p-4">${item.degree_name || ''}</td>
                    <td class="p-4">${item.department || ''}</td>
                    <td class="p-4">${item.internship_domain || ''}</td>
                    <td class="p-4">${item.whatsapp_number || ''}</td>
                    <td class="p-4">
                        ${item.payment_receipt_url && item.payment_receipt_url.startsWith('data:') 
                          ? `<a href="${item.payment_receipt_url}" target="_blank" class="text-secondary font-bold hover:underline" download="receipt.png">Download</a>`
                          : '<span class="text-gray-400">N/A</span>'}
                    </td>
                `;
                dataTableBody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
